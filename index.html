<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Templar's Vigil — Sir Aldren</title>
    <meta
      name="description"
      content="An immersive conversation with Sir Aldren, a 12th-century Templar knight."
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
<body>
  <!-- ======================================================
     PANTALLA DE ENTRADA
======================================================= -->

<div id="entry-screen" class="entry-screen">
  <div class="entry-content">

    <img
      src="images/ui/logo.png"
      alt="Order of Steel"
      class="entry-logo"
    >

    <h1 class="entry-title">
      ORDER OF STEEL
    </h1>

    <p class="entry-subtitle">
      A medieval AI experience
    </p>

    <button
      id="enter-button"
      class="enter-button"
      type="button"
    >
      ENTER THE ORDER
    </button>

    <p class="entry-sound">
      Best experienced with sound
    </p>

  </div>
</div>
  <div
  id="sceneLoader"
  class="scene-loader"
  aria-hidden="true"
  style="display: none;"
>
    <div class="scene-loader-content">
      <img
        src="images/escudo.png"
        alt=""
        class="scene-loader-crest"
      />

      <p class="scene-loader-title">ORDER OF STEEL</p>
      <p class="scene-loader-text">Preparando el camino...</p>
    </div>
  </div>

  <div class="scene" aria-hidden="true">
    <div id="sceneImage" class="scene-image"></div>

    <video
      id="sceneVideo"
      class="scene-video"
      muted
      autoplay
      loop
      playsinline
      preload="auto"
    ></video>
  </div>
<header class="top-bar">

  <div class="brand">

    <img
      src="images/ui/logo.png"
      alt="Order of Steel"
      class="top-logo"
    >

  </div>

 <div class="top-actions">
  <div class="languages">

    <p class="lang-title">
      Disponible en más de 100 idiomas
    </p>

    <div class="flags">
      <button class="flag-btn" type="button">🇪🇸</button>
      <button class="flag-btn" type="button">🇬🇧</button>
      <button class="flag-btn" type="button">🇫🇷</button>
      <button class="flag-btn" type="button">🇨🇳</button>
      <button class="flag-btn" type="button">🇩🇪</button>
    </div>

    <p class="lang-subtitle">
      Available in over 100 languages
    </p>

  </div>
</div>

</header>
  <div class="vignette" aria-hidden="true"></div>

  <section
    class="dialogue-panel"
    id="dialogue-panel"
    aria-label="Dialogue with Sir Aldren"
  >
    <div class="panel-inner">
      <div class="header-row">
        <img
          src="images/escudo.png"
          alt="Templar crest"
          class="crest"
          id="crest"
        />

        <h1 class="knight-name" id="knight-name">
          Sir Aldren
        </h1>
      </div>

      <p
        class="knight-response"
        id="knight-response"
      ></p>

      <p
        class="status"
        id="status"
        role="status"
        aria-live="polite"
      ></p>

      <div class="input-row">
        <input
          type="text"
          class="player-input"
          id="player-input"
          placeholder="Habla con el templario..."
          autocomplete="off"
          aria-label="Tu mensaje al templario"
        />

        <button
          class="send-btn"
          id="send-btn"
          type="button"
        >
          Enviar
        </button>
      </div>
    </div>
  </section>

  <audio
    id="backgroundMusic"
    src="./audio/order-of-steel-theme.mp3"
    loop
    preload="auto"
  ></audio>

  <script
    type="module"
    src="app.js"
  ></script>
</body>
</html>
